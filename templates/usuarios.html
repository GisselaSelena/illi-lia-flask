{% extends "base.html" %}

{% block content %}

<h2>Usuarios registrados</h2>

<ul style="list-style: none; padding: 0;">
{% for u in usuarios %}
<li style="margin-bottom: 20px;">
<strong>{{ u[1] }}</strong> - {{ u[2] }}
<br><br>
<a href="/editar_usuario/{{ u[0] }}">Editar</a>
<a href="/eliminar_usuario/{{ u[0] }}">Eliminar</a>
</li>
{% endfor %}
</ul>

{% endblock %}
