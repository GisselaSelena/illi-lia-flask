{% extends "base.html" %}

{% block content %}

<div class="card">

    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="mail" placeholder="Correo" required><br><br>
        <input type="password" name="password" placeholder="Contraseña" required><br><br>
        <button type="submit">Ingresar</button>
    </form>

    {% if mensaje %}
    <p style="color: red;">{{ mensaje }}</p>
    {% endif %}

</div>

{% endblock %}
