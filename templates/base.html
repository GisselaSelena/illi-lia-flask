<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Illi Liá{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header class="header">
    <div class="container">
        <h1>ILLÍ LIÁ</h1>
        <p class="eslogan">Jabones Decorativos Artesanales</p>

        <nav>
            <a href="/">Inicio</a>
            <a href="/about">Acerca de</a>
        </nav>

        <div class="auth">
            {% if current_user.is_authenticated %}
                <span>👋 {{ current_user.nombre }}</span>
                <a href="/logout">Cerrar sesión</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/registro">Registro</a>
            {% endif %}
        </div>
    </div>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<hr>

<footer>
    <p>© 2026 Illi Lia</p>
</footer>

</body>
</html>
