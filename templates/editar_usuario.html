{% extends "base.html" %}

{% block content %}

<h2>Editar Usuario</h2>

<form method="POST">

<label>Nombre</label><br>
<input type="text" name="nombre" value="{{ usuario[1] }}" required><br><br>

<label>Email</label><br>
<input type="email" name="mail" value="{{ usuario[2] }}" required><br><br>

<label>Password</label><br>
<input type="text" name="password" value="{{ usuario[3] }}" required><br><br>

<button type="submit">Actualizar</button>

</form>

{% endblock %}
